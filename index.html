<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Heyjin's Book Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --bg: #FDFCF8; --point: #556B2F; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        h1 { font-family: 'Noto Serif KR', serif; text-align: center; color: var(--point); font-size: 2.2rem; margin-bottom: 30px; }
        .dashboard { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        .box { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .admin-only { display: none; }
        .shelf-section { margin-top: 25px; }
        .shelf-title { font-family: 'Noto Serif KR'; color: var(--point); border-bottom: 2px solid var(--point); padding-bottom: 10px; margin-bottom: 15px; }
        .book-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-start; }
        .book-card { flex: 0 0 calc(20% - 12px); background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 12px; box-sizing: border-box; cursor: pointer; transition: 0.3s; }
        .book-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card-title { font-size: 13px; font-weight: bold; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { padding: 5px 12px; border: 1px solid var(--point); background: white; color: var(--point); border-radius: 5px; cursor: pointer; }
        .page-btn.active { background: var(--point); color: white; }
        #detail-popup, #log-form { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 1001; width: 450px; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index:999; }
        .btn { padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        #admin-lock { position: fixed; bottom: 20px; right: 20px; font-size: 18px; cursor: pointer; background: #eee; color: #aaa; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 2000; transition: 0.3s; border: none; }
    </style>
</head>
<body>
    <h1>📚 Heyjin's Book Archive</h1>
    <div class="dashboard">
        <div class="side-panel">
            <div class="box admin-only" id="search-box" style="margin-bottom:20px;">
                <h3>🔍 검색 & 추가</h3>
                <div style="display:flex; gap:5px; margin-bottom:15px;">
                    <input type="text" id="query" placeholder="책 제목 입력..." style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
                    <button onclick="searchBooks()" style="background:var(--point); color:white; border:none; border-radius:5px; padding:0 15px; cursor:pointer;">검색</button>
                </div>
                <div id="results" style="max-height: 200px; overflow-y: auto; font-size: 12px;"></div>
            </div>
            <div class="box"><h3>🎁 읽을 책 (Wishlist)</h3><div id="wish-list"></div></div>
        </div>
        <div class="main-content">
            <div class="box"><h3>📅 독서 달력</h3><div id="calendar"></div></div>
            <div class="shelf-section">
                <div class="shelf-title">✅ 다 읽은 서재</div>
                <div class="book-grid" id="read-list"></div>
                <div id="pagination-container"></div>
            </div>
        </div>
    </div>
    <button id="admin-lock" onclick="toggleAdmin()">🔒</button>
    <div class="overlay" id="overlay" onclick="closeAllPopups()"></div>

    <script>
        const TTB_KEY = 'ttbimhj03111147001';
        const ADMIN_PW = "0311"; 
        let isAdmin = false; 
        let myBooks = JSON.parse(localStorage.getItem('hyejinBooks')) || [];
        let calendar = null; let currentPage = 1; const itemsPerPage = 5;

        window.onload = () => { initCalendar(); renderArchive(); };

        async function searchBooks() {
            const query = document.getElementById('query').value;
            // [업데이트] 더 안정적인 중계 서버로 교체했습니다!
            const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=' + TTB_KEY + '&Query=' + query + '&MaxResults=5&output=js&Version=20131101')}`;
            
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const items = JSON.parse(data.contents).item;
                let html = '';
                items.forEach(b => {
                    html += `<div style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:5px;">
                        <span style="font-size:11px; flex:1;">${b.title}</span>
                        <div>
                            <button class="btn" style="background:#f0f0f0;" onclick="openLogForm('${b.title.replace(/'/g, "\\'")}', '${b.cover}')">읽음</button>
                        </div>
                    </div>`;
                });
                document.getElementById('results').innerHTML = html;
            } catch(e) { alert("검색 중 오류가 발생했습니다."); }
        }

        function toggleAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === ADMIN_PW) { isAdmin = true; renderArchive(); alert("잠금 해제!"); }
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'ko', height: 450,
                events: myBooks.map(b => ({ title: `📖 ${b.title}`, start: b.end, backgroundColor: '#556B2F' }))
            });
            calendar.render();
        }

        function renderArchive() {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'block' : 'none');
            let readHtml = '';
            myBooks.forEach(book => {
                readHtml += `<div class="book-card"><img src="${book.cover}"><div class="card-title">${book.title}</div></div>`;
            });
            document.getElementById('read-list').innerHTML = readHtml || '<p>기록을 추가해보세요!</p>';
        }

        function openLogForm(t, c) {
            const end = prompt("완독일을 입력하세요 (YYYY-MM-DD)", new Date().toISOString().split('T')[0]);
            if(end) {
                myBooks.push({title:t, cover:c, end:end});
                localStorage.setItem('hyejinBooks', JSON.stringify(myBooks));
                renderArchive(); calendar.addEvent({title: `📖 ${t}`, start: end});
            }
        }
    </script>
</body>
</html>
